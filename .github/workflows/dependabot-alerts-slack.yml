name: Dependabot Alerts to Slack

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.DEPENDABOT_ALERTS_TOKEN }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
      REPO: ${{ github.repository }}

    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Missing secret: DEPENDABOT_ALERTS_TOKEN"
            exit 1
          fi

          if [ -z "${SLACK_WEBHOOK:-}" ]; then
            echo "Missing secret: SLACK_WEBHOOK"
            exit 1
          fi

      - name: Fetch alerts from GitHub
        shell: bash
        run: |
          set -euo pipefail

          HTTP_STATUS=$(curl -sS \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -o alerts.json \
            -w "%{http_code}" \
            "https://api.github.com/repos/${REPO}/dependabot/alerts?state=open&per_page=100")

          echo "HTTP status: ${HTTP_STATUS}"

          if [ "${HTTP_STATUS}" != "200" ]; then
            echo "GitHub API request failed"
            cat alerts.json
            exit 1
          fi

          if ! jq empty alerts.json >/dev/null 2>&1; then
            echo "Invalid JSON response from GitHub API"
            cat alerts.json
            exit 1
          fi

      - name: Build Slack payload
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          import json
          from datetime import datetime, timedelta, timezone

          with open("alerts.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          if isinstance(data, dict):
              message = data.get("message", "Unknown API error")
              raise SystemExit(f"GitHub API returned an object instead of a list: {message}")

          if not isinstance(data, list):
              raise SystemExit("Unexpected GitHub API response format")

          now = datetime.now(timezone.utc)
          since = now - timedelta(hours=6)

          def parse_dt(value):
              if not value:
                  return None
              try:
                  return datetime.strptime(value, "%Y-%m-%dT%H:%M:%SZ").replace(tzinfo=timezone.utc)
              except ValueError:
                  return None

          filtered = []

          for alert in data:
              if not isinstance(alert, dict):
                  continue

              state = (alert.get("state") or "").lower()
              if state != "open":
                  continue

              security_vuln = alert.get("security_vulnerability") or {}
              security_adv = alert.get("security_advisory") or {}
              dependency = alert.get("dependency") or {}
              package = dependency.get("package") or {}

              severity = (security_vuln.get("severity") or "").lower()
              if severity not in {"high", "critical"}:
                  continue

              created_at = parse_dt(alert.get("created_at"))
              updated_at = parse_dt(alert.get("updated_at"))

              is_recent = (
                  (created_at is not None and created_at >= since) or
                  (updated_at is not None and updated_at >= since)
              )

              if not is_recent:
                  continue

              filtered.append({
                  "severity": severity.upper(),
                  "package": package.get("name") or "unknown-package",
                  "ecosystem": package.get("ecosystem") or "unknown-ecosystem",
                  "summary": security_adv.get("summary") or "No summary",
                  "cve": security_adv.get("cve_id") or "N/A",
                  "ghsa": security_adv.get("ghsa_id") or "N/A",
                  "url": alert.get("html_url") or "",
              })

          filtered = filtered[:10]

          if not filtered:
              payload = {
                  "text": "✅ No new HIGH/CRITICAL Dependabot alerts in the last 6 hours."
              }
          else:
              lines = []
              lines.append(f"🚨 New/updated HIGH/CRITICAL Dependabot alerts: {len(filtered)}")
              lines.append("")

              for item in filtered:
                  lines.append(
                      f"• {item['severity']} | {item['package']} ({item['ecosystem']})\n"
                      f"  {item['summary']}\n"
                      f"  CVE: {item['cve']} | GHSA: {item['ghsa']}\n"
                      f"  {item['url']}"
                  )

              payload = {"text": "\n".join(lines)}

          with open("slack-payload.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False)
          PY

      - name: Send to Slack
        shell: bash
        run: |
          set -euo pipefail

          curl -sS -X POST \
            -H "Content-Type: application/json" \
            --data @slack-payload.json \
            "${SLACK_WEBHOOK}"
